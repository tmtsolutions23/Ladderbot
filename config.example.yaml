# API Keys (or set ODDS_API_KEY and DISCORD_WEBHOOK_URL env vars)
odds_api_key: your-key-here
discord_webhook_url: https://discord.com/api/webhooks/...

# Ladder Settings
ladder:
  starting_amount: 10.00
  target_amount: 1000.00
  max_attempts: 50

# Parlay Settings
parlay:
  min_legs: 2
  max_legs: 2
  target_odds_min: 150
  target_odds_max: 300
  min_edge_per_leg: 0.008
  min_edge_cold_start: 0.01

# Model Settings
model:
  rolling_window: 20
  use_xgboost: false
  cold_start_games: 20

# Sports
sports:
  nba: true
  nhl: true

# Schedule
run_time: "11:00"
pre_game_refresh: 120
scheduler: "manual"
