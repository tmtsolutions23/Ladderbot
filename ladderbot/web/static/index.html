<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LadderBot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { background-color: #111827; color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-200">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold text-white tracking-tight">LADDERBOT</h1>
                <span class="text-xs bg-indigo-600 text-white px-2 py-0.5 rounded-full font-medium">v0.1</span>
            </div>
            <div id="header-ladder-info" class="text-sm text-gray-400">
                <!-- Filled by JS -->
            </div>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto flex">
            <button class="tab px-6 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 transition-colors" data-tab="picks">
                Picks
            </button>
            <button class="tab px-6 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 transition-colors" data-tab="ladder">
                Ladder
            </button>
            <button class="tab px-6 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 transition-colors" data-tab="performance">
                Performance
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">

        <!-- Picks Tab -->
        <div id="tab-picks" class="tab-content hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-white" id="picks-date-heading">TODAY'S PICKS</h2>
                <div class="flex gap-2">
                    <button id="scan-btn" onclick="scanForPicks()" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded font-medium transition-colors">
                        Scan Now
                    </button>
                    <button onclick="loadPicks()" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded transition-colors">
                        Refresh
                    </button>
                </div>
            </div>
            <div id="scan-status" class="hidden mb-4 bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm"></div>
            <div id="picks-container" class="space-y-4">
                <div class="text-gray-500 text-sm">Loading picks...</div>
            </div>
        </div>

        <!-- Ladder Tab -->
        <div id="tab-ladder" class="tab-content hidden">
            <h2 class="text-lg font-semibold text-white mb-6">LADDER TRACKER</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">Current Ladder</h3>
                    <div id="ladder-visual" class="bg-gray-800 border border-gray-700 rounded-lg p-6">
                        <div class="text-gray-500 text-sm">Loading ladder...</div>
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">History</h3>
                    <div id="ladder-history" class="space-y-3">
                        <div class="text-gray-500 text-sm">Loading history...</div>
                    </div>
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mt-6 mb-4">Stats</h3>
                    <div id="ladder-stats" class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                        <div class="text-gray-500 text-sm">Loading stats...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Performance Tab -->
        <div id="tab-performance" class="tab-content hidden">
            <h2 class="text-lg font-semibold text-white mb-6">PERFORMANCE</h2>

            <!-- Portfolio summary cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div id="perf-shadow" class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                    <div class="text-gray-500 text-sm">Loading...</div>
                </div>
                <div id="perf-ladder-pl" class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                    <div class="text-gray-500 text-sm">Loading...</div>
                </div>
                <div id="perf-clv" class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                    <div class="text-gray-500 text-sm">Loading...</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-3">P/L Over Time</h3>
                    <div class="relative" style="height: 250px;">
                        <canvas id="chart-pl"></canvas>
                    </div>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-3">Model Calibration</h3>
                    <div class="relative" style="height: 250px;">
                        <canvas id="chart-calibration"></canvas>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 mb-6">
                <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-3">CLV Scatter</h3>
                <div class="relative" style="height: 200px;">
                    <canvas id="chart-clv"></canvas>
                </div>
            </div>

            <!-- Bet History Table -->
            <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider">Bet History</h3>
                    <div class="flex gap-2">
                        <select id="filter-sport" class="bg-gray-700 text-gray-300 text-xs rounded px-2 py-1 border border-gray-600">
                            <option value="">All Sports</option>
                            <option value="nba">NBA</option>
                            <option value="nhl">NHL</option>
                        </select>
                        <select id="filter-result" class="bg-gray-700 text-gray-300 text-xs rounded px-2 py-1 border border-gray-600">
                            <option value="">All Results</option>
                            <option value="won">Won</option>
                            <option value="lost">Lost</option>
                            <option value="pending">Pending</option>
                        </select>
                        <select id="filter-placed" class="bg-gray-700 text-gray-300 text-xs rounded px-2 py-1 border border-gray-600">
                            <option value="">All</option>
                            <option value="true">Placed</option>
                            <option value="false">Skipped</option>
                        </select>
                    </div>
                </div>
                <div id="bet-history-table" class="overflow-x-auto">
                    <div class="text-gray-500 text-sm">Loading bets...</div>
                </div>
            </div>
        </div>

    </main>

    <script src="/static/app.js"></script>
</body>
</html>
